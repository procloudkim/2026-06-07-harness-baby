<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">BabyGear Risk Radar demo screenshot</title>
  <desc id="desc">Static Codex plugin demo showing a pacifier safety case organized into evidence, risk, alternatives, parent action, and MAS-QA PASS with uncertainty noted.</desc>
  <rect width="1200" height="800" fill="#f8fafc"/>
  <rect x="42" y="38" width="1116" height="724" rx="8" fill="#ffffff" stroke="#cbd5e1"/>

  <text x="76" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="33" font-weight="700" fill="#0f172a">BabyGear Risk Radar</text>
  <text x="76" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#475569">Codex CLI plugin package - MECE evidence, authority ladder, risk matrix, alternatives, and MAS-QA</text>

  <rect x="76" y="150" width="1048" height="82" rx="6" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="102" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#134e4a">Public-source case note</text>
  <text x="102" y="209" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#0f172a">Philips Avent Ultra Air soother: BPA-free claim vs reported detection vs manufacturer dispute</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="76" y="258" width="238" height="178" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="76" y="258" width="238" height="8" rx="4" fill="#2563eb"/>
    <text x="98" y="300" font-size="20" font-weight="700" fill="#0f172a">Evidence</text>
    <text x="98" y="330" font-size="14" fill="#334155">CPSC/eCFR/AAP first</text>
    <text x="98" y="355" font-size="14" fill="#334155">FDA/NIEHS for BPA context</text>
    <text x="98" y="380" font-size="14" fill="#334155">Manufacturer claim separated</text>
    <text x="98" y="409" font-size="13" fill="#64748b">Conflict preserved</text>

    <rect x="340" y="258" width="238" height="178" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
    <rect x="340" y="258" width="238" height="8" rx="4" fill="#ea580c"/>
    <text x="362" y="300" font-size="20" font-weight="700" fill="#0f172a">Risk</text>
    <text x="362" y="330" font-size="14" fill="#334155">Chemical/material signal</text>
    <text x="362" y="355" font-size="14" fill="#334155">Choking and attachment</text>
    <text x="362" y="380" font-size="14" fill="#334155">Recall and batch check</text>
    <text x="362" y="409" font-size="13" fill="#64748b">Severity != certainty</text>

    <rect x="604" y="258" width="238" height="178" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
    <rect x="604" y="258" width="238" height="8" rx="4" fill="#16a34a"/>
    <text x="626" y="300" font-size="20" font-weight="700" fill="#0f172a">Alternatives</text>
    <text x="626" y="330" font-size="14" fill="#334155">Material disclosure</text>
    <text x="626" y="355" font-size="14" fill="#334155">Traceability and certificates</text>
    <text x="626" y="380" font-size="14" fill="#334155">Age fit and cleaning</text>
    <text x="626" y="409" font-size="13" fill="#64748b">No affiliate picks</text>

    <rect x="868" y="258" width="256" height="178" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <rect x="868" y="258" width="256" height="8" rx="4" fill="#dc2626"/>
    <text x="890" y="300" font-size="20" font-weight="700" fill="#0f172a">Parent Action</text>
    <text x="890" y="330" font-size="14" fill="#334155">Do now: inspect product</text>
    <text x="890" y="355" font-size="14" fill="#334155">Check: recall, model, batch</text>
    <text x="890" y="380" font-size="14" fill="#334155">Ask: method and certificate</text>
    <text x="890" y="409" font-size="13" fill="#64748b">Escalate: clinician/regulator</text>
  </g>

  <rect x="76" y="466" width="1048" height="112" rx="6" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="102" y="505" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#312e81">Authority Ladder</text>
  <text x="102" y="536" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">1. Regulator/recall/standard  2. Pediatric guidance  3. FDA/NIEHS context  4. Manufacturer  5. Test/reporting</text>
  <text x="102" y="563" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Question routing keeps physical hazards, BPA context, brand claims, and parent observations separate.</text>

  <rect x="76" y="606" width="1048" height="92" rx="6" fill="#ecfdf5" stroke="#86efac"/>
  <text x="102" y="644" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#14532d">MAS-QA PASS - Uncertainty noted</text>
  <text x="102" y="674" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#166534">Parent Reality + Pediatric Safety + Clinician Communicator + Product Investigator + Brand Skeptic + Evidence QA</text>

  <text x="76" y="732" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#64748b">Static demo screenshot. No app server. No trademark logos. Decision support only, not medical advice.</text>
</svg>
